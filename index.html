<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Perpus MABi - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen flex flex-col justify-between"
  >
    <div
      class="bungkus-utama flex-grow flex flex-col items-center justify-center p-6"
    >
      <div class="teks-sambutan text-center mb-8">
        <div
          class="ikon-logo animasi-ngambang inline-block p-4 rounded-full bg-green-600 text-white shadow-lg mb-4"
        >
          <i class="fa-solid fa-book-quran text-4xl"></i>
        </div>
        <h1
          class="text-4xl md:text-5xl font-bold text-green-900 tracking-tight"
        >
          Selamat Datang
        </h1>
        <p class="text-xl text-green-700 font-medium mt-2">
          Di Perpustakaan Digital (E-Perpus)
        </p>
        <p class="text-gray-500 text-sm mt-1">
          MA Bilingual Muslimat NU Sidoarjo
        </p>
      </div>

      <div
        class="grup-kartu grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl z-10"
      >
        <button
          onclick="bukaLogin('siswa')"
          class="kartu-pilihan group bg-white hover:bg-green-600 border border-green-100 rounded-3xl p-8 transition-all shadow-xl text-left"
        >
          <i
            class="fa-solid fa-graduation-cap text-5xl text-green-600 group-hover:text-white mb-4 transition"
          ></i>
          <h3 class="font-bold text-2xl text-gray-800 group-hover:text-white">
            Login SISWA
          </h3>
          <p class="text-sm text-gray-500 group-hover:text-green-100 mt-2">
            Gunakan Email dan Password.
          </p>
        </button>

        <button
          onclick="bukaLogin('admin')"
          class="kartu-pilihan group bg-white hover:bg-gray-800 border border-gray-100 rounded-3xl p-8 transition-all shadow-xl text-left"
        >
          <i
            class="fa-solid fa-user-gear text-5xl text-gray-600 group-hover:text-white mb-4 transition"
          ></i>
          <h3 class="font-bold text-2xl text-gray-800 group-hover:text-white">
            Login ADMIN
          </h3>
          <p class="text-sm text-gray-500 group-hover:text-gray-400 mt-2">
            Kelola buku, murid & denda.
          </p>
        </button>
      </div>
    </div>

    <footer class="kaki-web text-center py-4 text-xs text-gray-400">
      Developed by <span class="font-bold text-green-600">mobmoB</span>
    </footer>

    <div
      id="modalLogin"
      class="layar-gelap fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4"
    >
      <div
        class="kotak-login bg-white w-full max-w-sm p-8 rounded-3xl shadow-2xl relative"
      >
        <button
          onclick="tutupLogin()"
          class="tombol-tutup absolute top-4 right-4 text-gray-400 hover:text-red-500"
        >
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <h2
          id="judulLogin"
          class="text-2xl font-bold text-center mb-6 text-green-800"
        >
          Login
        </h2>

        <form
          id="formMasuk"
          onsubmit="prosesLogin(event)"
          class="ruang-form space-y-4"
          autocomplete="off"
        >
          <input type="hidden" id="peran" />

          <div id="boxSiswa" class="hidden space-y-4">
            <input
              type="email"
              id="emailSiswa"
              autocomplete="off"
              class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50"
              placeholder="Email Kamu"
            />
            <div class="relatif relative">
              <input
                type="password"
                id="passSiswa"
                autocomplete="new-password"
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 pr-10"
                placeholder="Password Kamu"
              />
              <button
                type="button"
                onclick="intipSandi('passSiswa', 'ikonMataSiswa')"
                class="mata-sandi absolute right-3 top-3 text-gray-400 hover:text-green-600"
              >
                <i id="ikonMataSiswa" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <div id="boxAdmin" class="hidden space-y-4">
            <input
              type="text"
              id="userAdmin"
              autocomplete="off"
              class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50"
              placeholder="Username Admin"
            />
            <div class="relatif relative">
              <input
                type="password"
                id="passAdmin"
                autocomplete="new-password"
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 bg-gray-50 pr-10"
                placeholder="Password Admin"
              />
              <button
                type="button"
                onclick="intipSandi('passAdmin', 'ikonMataAdmin')"
                class="mata-sandi absolute right-3 top-3 text-gray-400 hover:text-green-600"
              >
                <i id="ikonMataAdmin" class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="tombol-gas w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg transition"
          >
            MASUK
          </button>
        </form>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
